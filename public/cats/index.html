<style>
/* ---------- Design tokens: warm storybook newspaper ---------- */
:root {
  --paper: #FBF1E0;
  --card: #FFFCF5;
  --ink: #43301F;
  --ink-soft: #6B543D;
  --accent: #A34823;
  --love: #2E6B3F;
  --pass: #7C5F4B;
  --peach: #FFD9B8;
  --blush: #F2B8A0;
  --dodo-body: #9AA7B4;
  --dodo-belly: #F6E7CE;
  --dodo-beak: #E8B04B;
  --shadow: 0 4px 14px rgba(67, 48, 31, 0.10);
  --radius: 1.5rem;
  --serif: 'Fraunces', Georgia, 'Times New Roman', serif;
  --sans: 'Atkinson Hyperlegible', 'Segoe UI', system-ui, sans-serif;
}

* { box-sizing: border-box; }
html { font-size: 100%; } /* never override — this is the OS text-scaling hook */
body {
  margin: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 1.375rem;
  line-height: 1.5;
  overflow-x: hidden;
}
.wrap { max-width: 40rem; margin: 0 auto; padding: 0 1rem; }

:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; border-radius: 0.5rem; }
.visually-hidden {
  position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0;
}

/* ---------- Masthead ---------- */
header { text-align: center; padding-top: 0.5rem; }
.backlink {
  display: inline-flex; align-items: center; min-height: 2.75rem; gap: 0.35rem;
  padding: 0.5rem 0.9rem; margin-bottom: 0.25rem;
  color: var(--accent); font-weight: 700; font-size: 1.125rem;
  text-decoration: none; touch-action: manipulation;
}
.rule { border: none; border-top: 2px solid var(--accent); margin: 0.5rem 0; }
.masthead-dodo { width: 5.75rem; height: 5.75rem; margin-bottom: -1.1rem; }
h1.wordmark {
  font-family: var(--serif);
  font-weight: 900;
  font-size: clamp(2.75rem, 13vw, 4.5rem);
  line-height: 1.05;
  margin: 0.25rem 0 0.5rem;
  letter-spacing: 0.01em;
}
.double-rule {
  display: flex; align-items: center; gap: 0.75rem;
  margin: 0.25rem 0 0.75rem;
}
.double-rule::before, .double-rule::after {
  content: ""; flex: 1;
  border-top: 1.5px solid var(--accent);
  box-shadow: 0 3px 0 -1.5px var(--accent);
  height: 4px;
}
.fleuron { width: 1.5rem; height: 1.5rem; flex: none; }
.edition {
  font-family: var(--serif); font-style: italic; font-weight: 600;
  font-size: 1.25rem; color: var(--accent); margin: 0.25rem 0;
}
.dateline { font-size: 1.125rem; color: var(--ink-soft); margin: 0.25rem 0; }
.pexels-byline {
  display: none;
  padding: 0.6rem 1rem; margin: 0.1rem 0 0.25rem;
}
.pexels-byline.show { display: inline-block; }
.pexels-byline a { color: var(--accent); font-size: 1.125rem; }

/* ---------- Cards ---------- */
main { padding-bottom: 3rem; }
.card {
  background: var(--card);
  border: 2px solid var(--peach);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin: 0 0 2.5rem;
  overflow: hidden;
}
.media-frame {
  position: relative;
  aspect-ratio: 4 / 5;
  background: var(--peach);
}
.media-frame.video-mat {
  background: radial-gradient(ellipse at center, var(--peach) 0%, var(--paper) 100%);
}
.media-frame img, .media-frame video {
  position: absolute; inset: 0; width: 100%; height: 100%;
  opacity: 0; transition: opacity 0.4s ease;
}
.media-frame img { object-fit: cover; }
.media-frame video { object-fit: contain; }
.media-frame.loaded img, .media-frame.loaded video { opacity: 1; }
.placeholder {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
}
.placeholder svg { width: 45%; aspect-ratio: 3 / 2; height: auto; opacity: 0.9; }
.shimmer {
  position: absolute; inset: 0; overflow: hidden;
}
.shimmer::after {
  content: ""; position: absolute; inset: 0;
  transform: translateX(-100%);
  background: linear-gradient(90deg, transparent, rgba(255, 252, 245, 0.55), transparent);
  animation: shimmer-sweep 2.5s ease-in-out infinite;
}
@keyframes shimmer-sweep { to { transform: translateX(100%); } }
.media-frame.loaded .placeholder, .media-frame.loaded .shimmer { display: none; }

.chip {
  position: absolute; top: 0.75rem; left: 0.75rem;
  background: var(--card); border: 2px solid var(--peach);
  border-radius: 2rem; padding: 0.3rem 0.9rem;
  font-size: 1rem; font-weight: 700; color: var(--ink);
  box-shadow: var(--shadow);
}
.sound-btn {
  position: absolute; bottom: 0.75rem; right: 0.75rem;
  min-height: 3.25rem; padding: 0.4rem 1.1rem;
  background: var(--card); border: 2px solid var(--peach);
  border-radius: 2rem; font-family: var(--sans);
  font-size: 1.125rem; font-weight: 700; color: var(--ink);
  box-shadow: var(--shadow); cursor: pointer;
  touch-action: manipulation;
}
.big-play {
  position: absolute; inset: 0; margin: auto;
  width: 5.5rem; height: 5.5rem; border-radius: 50%;
  background: var(--card); border: 3px solid var(--accent);
  color: var(--accent); font-size: 2.25rem;
  box-shadow: var(--shadow); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  touch-action: manipulation;
}

.prompt {
  font-weight: 700; text-align: center;
  margin: 1.1rem 1rem 0.9rem;
}
.rate-row {
  display: flex; gap: 1rem; padding: 0 1rem 1.1rem;
}
.rate-btn {
  flex: 1; min-height: 4rem;
  border: none; border-radius: 1.25rem;
  font-family: var(--sans); font-size: 1.5rem; font-weight: 700;
  color: #fff; cursor: pointer;
  touch-action: manipulation; user-select: none;
  padding: 0.5rem 0.25rem;
}
.rate-btn .thumb { font-size: 1.75rem; margin-right: 0.35rem; }
.btn-love { background: var(--love); }
.btn-pass { background: var(--pass); }
.rate-btn.bounce { animation: squash 0.35s ease; }
@keyframes squash {
  0% { transform: scale(1); }
  30% { transform: scale(0.92); }
  70% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

.rated-chip {
  margin: 0 1rem 1.1rem;
  background: var(--peach); border-radius: 1.25rem;
  padding: 1rem; text-align: center; font-weight: 700;
}
.rated-chip .change-link {
  display: inline-block; margin-left: 0.35rem;
  font-size: 1.125rem; font-weight: 400;
  color: var(--ink-soft); background: none; border: none;
  text-decoration: underline; cursor: pointer;
  font-family: var(--sans); padding: 0.6rem 0.9rem; min-height: 2.75rem;
  touch-action: manipulation;
}

.credit {
  display: block; text-align: center;
  padding: 0 1rem 1rem; font-size: 1.125rem; color: var(--ink-soft);
}
.credit a { color: var(--accent); display: inline-block; padding: 0.35rem 0.5rem; }

/* Thumbed-down collapse */
.card.dismissing { transition: max-height 0.6s ease-in-out; overflow: hidden; }
.card.dismissing > * { transition: opacity 0.45s ease; opacity: 0; }
.dismissed-strip {
  display: flex; align-items: center; justify-content: space-between;
  gap: 0.75rem; padding: 1rem; flex-wrap: wrap;
}
.dismissed-strip .msg { font-weight: 700; }
.bring-back {
  min-height: 3rem; padding: 0.5rem 1.1rem;
  background: var(--card); color: var(--accent);
  border: 2px solid var(--accent); border-radius: 1rem;
  font-family: var(--sans); font-size: 1.125rem; font-weight: 700;
  cursor: pointer; touch-action: manipulation;
}

/* ---------- State cards (loading / napping / oops) ---------- */
.state-card {
  background: var(--card); border: 2px solid var(--peach);
  border-radius: var(--radius); box-shadow: var(--shadow);
  margin: 0 0 2.5rem; padding: 2rem 1.25rem; text-align: center;
}
.state-card svg { width: 55%; max-width: 14rem; height: auto; }
.state-card .msg {
  font-family: var(--serif); font-weight: 600;
  font-size: 1.625rem; line-height: 1.35; margin: 1rem 0;
}
.state-card .sub { font-size: 1.125rem; color: var(--ink-soft); margin: 0.5rem 0 0; }
.state-btn {
  min-height: 4rem; padding: 0.75rem 1.75rem;
  background: var(--accent); color: #fff;
  border: none; border-radius: 1.25rem;
  font-family: var(--sans); font-size: 1.5rem; font-weight: 700;
  cursor: pointer; touch-action: manipulation; margin-top: 0.5rem;
}

/* ---------- New kitties pill ---------- */
.pill {
  position: fixed; top: 1rem; left: 50%; transform: translateX(-50%);
  z-index: 50;
  background: var(--accent); color: #fff;
  border: none; border-radius: 2rem;
  min-height: 3.5rem; padding: 0.75rem 1.5rem;
  font-family: var(--sans); font-size: 1.25rem; font-weight: 700;
  box-shadow: 0 6px 18px rgba(67, 48, 31, 0.28); cursor: pointer;
  touch-action: manipulation;
  display: none;
}
.pill.show { display: block; }

/* ---------- Celebration ---------- */
#celebrate {
  position: fixed; inset: 0; pointer-events: none; z-index: 60;
}
.float-word {
  position: fixed; z-index: 61; pointer-events: none;
  font-family: var(--serif); font-style: italic; font-weight: 600;
  font-size: 1.75rem; color: var(--accent);
  animation: float-up 1.4s ease-out forwards;
}
@keyframes float-up {
  from { opacity: 0; transform: translate(-50%, 0); }
  20% { opacity: 1; }
  to { opacity: 0; transform: translate(-50%, -4.5rem); }
}

/* ---------- Icon generator (dev) ---------- */
.iconlab { padding: 1rem; text-align: center; }
.iconlab a { display: inline-block; margin: 0.5rem; color: var(--accent); }

/* ---------- Reduced motion ---------- */
@media (prefers-reduced-motion: reduce) {
  .shimmer::after { animation: none; }
  .rate-btn.bounce { animation: none; }
  .card.dismissing { transition: none; }
  .card.dismissing > * { transition: none; }
  .float-word { animation: float-up 1.4s steps(1) forwards; }
  .media-frame img, .media-frame video { transition: none; }
  .breathing { animation: none !important; }
}
.breathing { animation: breathe 2.4s ease-in-out infinite; transform-origin: 50% 90%; }
@keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
</style>
</head>

<script>
"use strict";
/* ================= Helpers ================= */
function el(tag, cls, text) {
  const node = document.createElement(tag);
  if (cls) node.className = cls;
  if (text !== undefined) node.textContent = text;
  return node;
}
function loadLS(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw === null ? fallback : JSON.parse(raw);
  } catch (e) { return fallback; }
}
function saveLS(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) { /* full or private mode — fine */ }
}
function announce(text) {
  const a = document.getElementById("announcer");
  a.textContent = "";
  requestAnimationFrame(() => { a.textContent = text; });
}

/* ================= State ================= */
const FEED_KEY = "dd-feed", RATINGS_KEY = "dd-ratings", OUTBOX_KEY = "dd-outbox", UPCOUNT_KEY = "dd-upcount";
const STALE_MS = 45 * 60 * 1000;
const KEEP_ITEMS = 60;
const $feed = document.getElementById("feed");
const $sentinel = document.getElementById("sentinel");
const motionQuery = window.matchMedia("(prefers-reduced-motion: reduce)");
const state = {
  items: new Map(),            // id -> item, insertion order = feed order
  ratings: loadLS(RATINGS_KEY, {}),
  outbox: loadLS(OUTBOX_KEY, []),
  upCount: loadLS(UPCOUNT_KEY, 0),
  sources: null,
  lastFetch: 0,
  loading: false,
  coolUntil: 0,
  reducedMotion: motionQuery.matches,
};
if (motionQuery.addEventListener) {
  motionQuery.addEventListener("change", (e) => { state.reducedMotion = e.matches; });
}

/* ================= Masthead ================= */
document.getElementById("dateline").textContent =
  new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" }) +
  " · Made with love for Dodo ❤";

function updatePexelsByline() {
  if (state.sources && state.sources.pexels) {
    document.getElementById("pexels-byline").classList.add("show");
  }
}

/* ================= Feed persistence (so she can always scroll back) ================= */
let saveTimer = null;
function saveFeedSoon() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveFeedNow, 400);
}
function saveFeedNow() {
  const cards = [...$feed.querySelectorAll(".card[data-id]")];
  if (cards.length === 0) return; // never overwrite a good save with emptiness
  // Keep a window of cards around wherever she currently is, anchored by the
  // topmost visible card, so both scroll-back and reopen land where she left off.
  let anchorIdx = cards.findIndex((c) => c.getBoundingClientRect().bottom > 0);
  if (anchorIdx === -1) anchorIdx = cards.length - 1;
  const start = Math.max(0, Math.min(anchorIdx - 8, cards.length - KEEP_ITEMS));
  const kept = cards.slice(start, start + KEEP_ITEMS);
  const anchor = cards[anchorIdx];
  saveLS(FEED_KEY, {
    items: kept.map((c) => state.items.get(c.dataset.id)).filter(Boolean),
    anchorId: anchor.dataset.id,
    anchorOffset: Math.round(anchor.getBoundingClientRect().top),
    savedAt: state.lastFetch || Date.now(),
  });
}

function restoreFeed() {
  const saved = loadLS(FEED_KEY, null);
  if (!saved || !Array.isArray(saved.items) || saved.items.length === 0) return false;
  if (Date.now() - (saved.savedAt || 0) > 7 * 24 * 60 * 60 * 1000) return false;
  let rendered = 0;
  for (const item of saved.items) {
    if (!item || !item.id || state.items.has(item.id)) continue;
    const local = state.ratings[item.id];
    if (local && local.rating === "down") continue;
    state.items.set(item.id, item);
    $feed.appendChild(renderCard(item));
    rendered++;
  }
  if (rendered === 0) return false;
  state.lastFetch = saved.savedAt || 0;
  requestAnimationFrame(() => {
    const anchor = saved.anchorId &&
      $feed.querySelector('.card[data-id="' + CSS.escape(saved.anchorId) + '"]');
    if (anchor) {
      const top = anchor.getBoundingClientRect().top + window.scrollY - (saved.anchorOffset || 0);
      window.scrollTo(0, Math.max(0, top));
    }
  });
  return true;
}

/* ================= Fetching ================= */
async function fetchBatch(count) {
  const res = await fetch(`/api/feed?count=${count}`);
  if (!res.ok) throw new Error("feed " + res.status);
  return res.json();
}

function freshItemsFrom(data) {
  state.sources = data.sources || state.sources;
  updatePexelsByline();
  return (data.items || []).filter((item) => {
    if (!item || !item.id || state.items.has(item.id)) return false;
    const local = state.ratings[item.id];
    if (local && local.rating === "down") return false;
    if (item.rating === "down") return false;
    return true;
  });
}

let firstLoadCards = [];
function showFirstLoadShimmer() {
  for (let i = 0; i < 2; i++) {
    const card = el("article", "card");
    const frame = el("div", "media-frame");
    frame.appendChild(makePlaceholder());
    card.appendChild(frame);
    if (i === 0) {
      card.appendChild(el("p", "prompt", "Fetching fresh kitties…"));
    }
    $feed.appendChild(card);
    firstLoadCards.push(card);
  }
}
function clearFirstLoadShimmer() {
  firstLoadCards.forEach((c) => c.remove());
  firstLoadCards = [];
}

let errorRetried = false;
let retryTimer = null;

function nearBottom() {
  return document.documentElement.scrollHeight - (window.scrollY + window.innerHeight) <
    window.innerHeight * 2.5;
}

async function loadMore(count) {
  if (state.loading || Date.now() < state.coolUntil) return;
  clearTimeout(retryTimer);
  state.loading = true;
  removeStateCard();
  const isFirst = state.items.size === 0;
  if (isFirst) showFirstLoadShimmer();
  try {
    const data = await fetchBatch(count || 8);
    const fresh = freshItemsFrom(data);
    clearFirstLoadShimmer();
    if (fresh.length === 0) {
      const waitMs = (data.retryAfter || 30) * 1000;
      state.coolUntil = Date.now() + waitMs;
      if (state.items.size === 0) {
        // Nothing has ever loaded (cold server, upstreams warming) — keep trying
        // quietly on our own; the button is just for the impatient.
        showStateCard("napping", "The kitties are waking up — one moment!",
          "🐾 Wake the kitties", () => {
            state.coolUntil = 0;
            loadMore(count);
          });
        retryTimer = setTimeout(() => { state.coolUntil = 0; loadMore(count); }, waitMs + 400);
      } else if ((data.items || []).length === 0) {
        showStateCard("napping", "That’s all the kitties for now! They’ll be back after their nap. ❤",
          "Back to the top", () => {
            window.scrollTo({ top: 0, behavior: state.reducedMotion ? "auto" : "smooth" });
            removeStateCard();
          }, "New kitties arrive every day.");
      }
      // (items came back but were all repeats: cool down silently; the scroll
      // fallback below asks again once the cooldown passes)
    } else {
      errorRetried = false;
      for (const item of fresh) {
        state.items.set(item.id, item);
        $feed.appendChild(renderCard(item));
      }
      state.lastFetch = Date.now();
      saveFeedSoon();
      // A small batch may not push the sentinel out of its margin, which would
      // stall the observer forever — top up until the page is comfortably tall.
      requestAnimationFrame(() => { if (nearBottom()) loadMore(8); });
    }
  } catch (err) {
    clearFirstLoadShimmer();
    if (!errorRetried) {
      errorRetried = true;
      retryTimer = setTimeout(() => loadMore(count), 2000);
      return;
    }
    state.coolUntil = Date.now() + 15000;
    if (!navigator.onLine) {
      showStateCard("napping", "No internet right now. The kitties will be here when you’re back!");
    } else {
      showStateCard("oops", "The kitties are napping — try again in a moment!",
        "🐾 Wake the kitties", () => {
          errorRetried = false;
          state.coolUntil = 0;
          loadMore(count);
        });
    }
  } finally {
    state.loading = false;
  }
}

// Belt-and-suspenders for the IntersectionObserver: it only fires on crossings,
// so a stalled sentinel would otherwise dead-end the feed. Cheap guards inside.
let scrollTick = false;
window.addEventListener("scroll", () => {
  if (scrollTick) return;
  scrollTick = true;
  setTimeout(() => {
    scrollTick = false;
    if (nearBottom()) loadMore(8);
  }, 400);
}, { passive: true });

// Returns how many kitties were added; -1 when it couldn't even try.
async function prependFresh() {
  if (state.loading) return -1;
  state.loading = true;
  let added = 0;
  try {
    const data = await fetchBatch(8);
    const fresh = freshItemsFrom(data);
    const firstCard = $feed.querySelector(".card");
    for (const item of fresh.reverse()) {
      state.items.set(item.id, item);
      const card = renderCard(item);
      if (firstCard) $feed.insertBefore(card, $feed.firstChild);
      else $feed.appendChild(card);
    }
    added = fresh.length;
    if (added > 0) {
      state.lastFetch = Date.now();
      saveFeedSoon();
    }
  } catch (err) {
    added = -1;
  }
  state.loading = false;
  if (added > 0) {
    window.scrollTo({ top: 0, behavior: state.reducedMotion ? "auto" : "smooth" });
  }
  return added;
}

/* ================= Card rendering ================= */
function makePlaceholder() {
  const wrap = el("div", "placeholder");
  wrap.innerHTML = '<svg aria-hidden="true" viewBox="0 0 120 80"><use href="#cat-loaf"/></svg>';
  const shimmer = el("div", "shimmer");
  wrap.appendChild(shimmer);
  return wrap;
}

function creditText(item) {
  if (!item.credit || !item.credit.name) return null;
  const serviceNames = { thecatapi: "TheCatAPI", cataas: "Cataas" };
  if (item.credit.name === serviceNames[item.source]) {
    return { pre: "From ", name: item.credit.name, link: item.credit.link };
  }
  const kind = item.type === "video" ? "Video" : "Photo";
  return { pre: kind + " by ", name: item.credit.name, link: item.credit.link, suffix: " · Pexels" };
}

function renderCard(item) {
  const card = el("article", "card");
  card.dataset.id = item.id;

  const frame = el("div", "media-frame" + (item.type === "video" ? " video-mat" : ""));
  frame.appendChild(makePlaceholder());

  if (item.type === "video") {
    const video = document.createElement("video");
    video.muted = true;
    video.playsInline = true;
    video.setAttribute("playsinline", "");
    video.loop = true;
    video.preload = "metadata";
    if (item.poster) video.poster = item.poster;
    video.src = item.src;
    video.setAttribute("aria-label", "Cat video" + (item.credit ? " by " + item.credit.name : ""));
    video.addEventListener("loadeddata", () => frame.classList.add("loaded"));
    if (item.poster) {
      // A poster is enough to show the frame nicely before playback.
      const posterImg = new Image();
      posterImg.onload = () => frame.classList.add("loaded");
      posterImg.src = item.poster;
    }
    video.addEventListener("error", () => removeBrokenCard(card, item, video));
    video.addEventListener("playing", () => {
      const stale = frame.querySelector(".big-play");
      if (stale) stale.remove();
    });
    frame.appendChild(video);

    const chip = el("span", "chip", "🎬 Video");
    frame.appendChild(chip);

    const soundBtn = el("button", "sound-btn", "🔇 Sound");
    soundBtn.setAttribute("aria-label", "Turn sound on");
    soundBtn.addEventListener("click", () => {
      video.muted = !video.muted;
      if (!video.muted) {
        document.querySelectorAll("video").forEach((v) => { if (v !== video) v.muted = true; });
        document.querySelectorAll(".sound-btn").forEach((b) => {
          if (b !== soundBtn) { b.textContent = "🔇 Sound"; b.setAttribute("aria-label", "Turn sound on"); }
        });
      }
      soundBtn.textContent = video.muted ? "🔇 Sound" : "🔊 Sound on";
      soundBtn.setAttribute("aria-label", video.muted ? "Turn sound on" : "Turn sound off");
    });
    frame.appendChild(soundBtn);
    videoObserver.observe(video);
  } else {
    const img = new Image();
    // First screenful loads eagerly (instant delight); the rest lazily.
    img.loading = state.items.size <= 3 ? "eager" : "lazy";
    img.decoding = "async";
    img.alt = (item.type === "gif" ? "Cat GIF" : "Cat photo") + (item.credit ? " from " + item.credit.name : "");
    img.addEventListener("load", () => frame.classList.add("loaded"));
    img.addEventListener("error", () => removeBrokenCard(card, item, img));
    img.src = item.src;
    frame.appendChild(img);
    if (item.type === "gif") {
      frame.appendChild(el("span", "chip", "✨ Moving picture!"));
    }
  }
  card.appendChild(frame);

  const local = state.ratings[item.id];
  const ratedUp = (local && local.rating === "up") || item.rating === "up";
  if (ratedUp) {
    card.appendChild(makeLovedChip(item, card));
  } else {
    card.appendChild(el("p", "prompt", "Do you like this kitty?"));
    card.appendChild(makeRateRow(item, card));
  }

  const credit = creditText(item);
  if (credit) {
    const p = el("p", "credit");
    p.append(credit.pre);
    if (credit.link && /^https?:\/\//i.test(credit.link)) {
      const a = el("a", null, credit.name);
      a.href = credit.link;
      a.target = "_blank";
      a.rel = "noopener";
      p.appendChild(a);
    } else {
      p.append(credit.name);
    }
    if (credit.suffix) p.append(credit.suffix);
    card.appendChild(p);
  }

  return card;
}

// Media that errors while OFFLINE isn't broken — retry it when we're back,
// and never let it delete the card (that would erase her saved feed).
const mediaRetryQueue = [];
function removeBrokenCard(card, item, media) {
  if (media && !media.isConnected) return; // card content was replaced (e.g. dismissed strip)
  if (!navigator.onLine) {
    mediaRetryQueue.push({ media, src: item.src });
    return;
  }
  card.remove();
  state.items.delete(item.id);
  saveFeedSoon();
}
function retryQueuedMedia() {
  while (mediaRetryQueue.length) {
    const { media, src } = mediaRetryQueue.pop();
    if (media && media.isConnected) {
      media.src = "";
      media.src = src;
    }
  }
}

function makeRateRow(item, card) {
  const row = el("div", "rate-row");
  const loveBtn = el("button", "rate-btn btn-love");
  loveBtn.innerHTML = '<span class="thumb" aria-hidden="true">👍</span>Love it!';
  const passBtn = el("button", "rate-btn btn-pass");
  passBtn.innerHTML = '<span class="thumb" aria-hidden="true">👎</span>Not for me';
  loveBtn.addEventListener("click", () => rateUp(item, card, loveBtn));
  passBtn.addEventListener("click", () => rateDown(item, card, passBtn));
  row.append(loveBtn, passBtn);
  return row;
}

function makeLovedChip(item, card) {
  const chip = el("div", "rated-chip");
  chip.setAttribute("tabindex", "-1");
  chip.append("❤ You loved this kitty!");
  const change = el("button", "change-link", "change");
  change.addEventListener("click", () => {
    const prompt = el("p", "prompt", "Do you like this kitty?");
    const row = makeRateRow(item, card);
    chip.replaceWith(prompt);
    prompt.after(row);
    row.querySelector(".btn-love").focus({ preventScroll: true });
  });
  chip.appendChild(change);
  return chip;
}

/* ================= Ratings ================= */
function setLocalRating(item, rating) {
  if (rating === "none") delete state.ratings[item.id];
  else state.ratings[item.id] = { rating, ts: Date.now() };
  saveLS(RATINGS_KEY, state.ratings);
}

// Outbox-first: every rating is queued in localStorage BEFORE the network is
// tried, and removed only on confirmed success — a tap followed instantly by
// pressing the home button (her usual move) can never lose a rating.
function sendPayload(payload) {
  return fetch("/api/rating", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    keepalive: true,
    body: JSON.stringify(payload),
  }).then((res) => {
    if (res.ok) {
      const i = state.outbox.indexOf(payload);
      if (i !== -1) {
        state.outbox.splice(i, 1);
        saveLS(OUTBOX_KEY, state.outbox);
      }
      return true;
    }
    return false;
  }).catch(() => false);
}

function postRating(item, rating) {
  const payload = {
    itemId: item.id, itemType: item.type, src: item.src,
    poster: item.poster || null, source: item.source,
    credit: item.credit || null, rating,
  };
  state.outbox.push(payload);
  saveLS(OUTBOX_KEY, state.outbox);
  sendPayload(payload);
}

let flushing = false;
async function flushOutbox() {
  if (flushing || state.outbox.length === 0) return;
  flushing = true;
  try {
    // Newest rating per kitty wins; drop superseded entries so a failed old
    // "down" can never replay over a later "bring it back".
    const latest = new Map();
    for (const p of state.outbox) latest.set(p.itemId, p);
    state.outbox = state.outbox.filter((p) => latest.get(p.itemId) === p);
    saveLS(OUTBOX_KEY, state.outbox);
    for (const payload of [...state.outbox]) {
      const ok = await sendPayload(payload);
      if (!ok) break; // try again on the next flush; keeps ordering intact
    }
  } finally {
    flushing = false;
  }
}

const SWEET_WORDS = ["Purrfect!", "Lovely!", "So sweet!", "What a cutie!", "Aww!"];
function rateUp(item, card, btn) {
  setLocalRating(item, "up");
  postRating(item, "up");
  if (navigator.vibrate) navigator.vibrate(30);
  state.upCount++;
  saveLS(UPCOUNT_KEY, state.upCount);

  const rect = btn.getBoundingClientRect();
  const x = rect.left + rect.width / 2;
  const y = rect.top + rect.height / 2;
  const isFifth = state.upCount % 5 === 0;
  if (!state.reducedMotion) {
    btn.classList.add("bounce");
    burst(x, y, isFifth ? 32 : 16);
  } else {
    burstStatic(x, y);
  }
  if (isFifth) floatWord(x, y, SWEET_WORDS[(state.upCount / 5 - 1) % SWEET_WORDS.length]);

  const prompt = card.querySelector(".prompt");
  const row = card.querySelector(".rate-row");
  const chip = makeLovedChip(item, card);
  if (prompt) prompt.remove();
  if (row) row.replaceWith(chip);
  chip.focus({ preventScroll: true });
  announce("Saved — you loved this kitty!");
  saveFeedSoon();
}

function rateDown(item, card, btn) {
  setLocalRating(item, "down");
  postRating(item, "down");
  if (navigator.vibrate) navigator.vibrate(20);
  announce("Okay — fewer like this.");

  const showStrip = () => {
    card.classList.remove("dismissing");
    card.style.maxHeight = "";
    card.innerHTML = "";
    const strip = el("div", "dismissed-strip");
    strip.appendChild(el("span", "msg", "Okay! Fewer like this. 🐾"));
    const back = el("button", "bring-back", "Oops — bring it back");
    back.addEventListener("click", () => {
      setLocalRating(item, "none");
      postRating(item, "none");
      const restored = renderCard(item);
      card.replaceWith(restored);
      announce("It’s back!");
      const loveBtn = restored.querySelector(".btn-love");
      if (loveBtn) loveBtn.focus({ preventScroll: true });
      saveFeedSoon();
    });
    strip.appendChild(back);
    card.appendChild(strip);
    back.focus({ preventScroll: true });
    saveFeedSoon();
  };

  if (state.reducedMotion) {
    showStrip();
  } else {
    // The visual collapse rides on rAF, but the state change must not: rAF
    // never fires in a backgrounded page, and the card would be stuck mid-
    // dismissal if she switches apps right after tapping.
    card.style.maxHeight = card.offsetHeight + "px";
    card.classList.add("dismissing");
    requestAnimationFrame(() => { card.style.maxHeight = "6.5rem"; });
    setTimeout(showStrip, 620);
  }
}

/* ================= Celebration particles ================= */
const canvas = document.getElementById("celebrate");
const ctx = canvas.getContext("2d");
const HEART_COLORS = ["#D96C4F", "#F2B8A0", "#E8B04B", "#C65D3B"];
let particles = [];
let rafRunning = false;

function sizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener("resize", sizeCanvas);

function burst(x, y, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 5,
      vy: -(4 + Math.random() * 3.5),
      rot: Math.random() * Math.PI * 2,
      vr: (Math.random() - 0.5) * 0.2,
      size: 12 + Math.random() * 16,
      life: 1,
      decay: 0.012 + Math.random() * 0.008,
      phase: Math.random() * Math.PI * 2,
      kind: i % 6 === 5 ? "paw" : "heart",
      color: HEART_COLORS[Math.floor(Math.random() * HEART_COLORS.length)],
    });
  }
  if (!rafRunning) { rafRunning = true; requestAnimationFrame(tick); }
}

function burstStatic(x, y) {
  // Reduced motion: one gentle heart pop, opacity only.
  particles.push({ x, y: y - 40, vx: 0, vy: 0, rot: 0, vr: 0, size: 26, life: 1, decay: 0.02, phase: 0, kind: "heart", color: HEART_COLORS[0], still: true });
  if (!rafRunning) { rafRunning = true; requestAnimationFrame(tick); }
}

function drawHeart(size) {
  ctx.beginPath();
  ctx.moveTo(0, size * 0.35);
  ctx.bezierCurveTo(-size * 0.55, -size * 0.1, -size * 0.3, -size * 0.55, 0, -size * 0.2);
  ctx.bezierCurveTo(size * 0.3, -size * 0.55, size * 0.55, -size * 0.1, 0, size * 0.35);
  ctx.fill();
}

function drawPaw(size) {
  ctx.beginPath();
  ctx.ellipse(0, size * 0.15, size * 0.3, size * 0.24, 0, 0, Math.PI * 2);
  ctx.fill();
  for (const dx of [-0.28, 0, 0.28]) {
    ctx.beginPath();
    ctx.arc(dx * size, -size * 0.22 + Math.abs(dx) * size * 0.3, size * 0.12, 0, Math.PI * 2);
    ctx.fill();
  }
}

function tick() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const p of particles) {
    if (!p.still) {
      p.x += p.vx + Math.sin(p.phase) * 0.6;
      p.y += p.vy;
      p.vy += 0.16;
      p.rot += p.vr;
      p.phase += 0.15;
    }
    p.life -= p.decay;
    if (p.life <= 0) continue;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.globalAlpha = Math.max(0, Math.min(1, p.life * 1.4));
    ctx.fillStyle = p.color;
    if (p.kind === "paw") drawPaw(p.size); else drawHeart(p.size);
    ctx.restore();
  }
  particles = particles.filter((p) => p.life > 0);
  if (particles.length > 0) requestAnimationFrame(tick);
  else { rafRunning = false; ctx.clearRect(0, 0, canvas.width, canvas.height); }
}

function floatWord(x, y, word) {
  const span = el("span", "float-word", word);
  span.style.left = x + "px";
  span.style.top = (y - 60) + "px";
  document.body.appendChild(span);
  setTimeout(() => span.remove(), 1500);
}

/* ================= Video autoplay (Facebook-style) ================= */
const videoObserver = new IntersectionObserver((entries) => {
  for (const entry of entries) {
    const video = entry.target;
    if (entry.isIntersecting && entry.intersectionRatio >= 0.6) {
      const attempt = video.play();
      if (attempt) attempt.catch((err) => {
        // pause() interrupting a pending play() is normal flick-scrolling,
        // not an autoplay block — no play button for that.
        if (err && err.name === "AbortError") return;
        showBigPlay(video);
      });
    } else {
      video.pause();
    }
  }
}, { threshold: [0, 0.6] });

function showBigPlay(video) {
  const frame = video.closest(".media-frame");
  if (!frame || frame.querySelector(".big-play")) return;
  const btn = el("button", "big-play", "▶");
  btn.setAttribute("aria-label", "Play video");
  btn.addEventListener("click", () => {
    video.play().catch(() => {});
    btn.remove();
  });
  frame.appendChild(btn);
}

/* ================= State cards ================= */
function removeStateCard() {
  const existing = document.getElementById("state-card");
  if (existing) existing.remove();
}
function showStateCard(pose, message, btnLabel, onClick, subText) {
  removeStateCard();
  const card = el("div", "state-card");
  card.id = "state-card";
  card.innerHTML = `<svg aria-hidden="true" viewBox="0 0 200 200"><use href="#dodo-${pose}"/></svg>`;
  card.appendChild(el("p", "msg", message));
  if (btnLabel) {
    const btn = el("button", "state-btn", btnLabel);
    btn.addEventListener("click", onClick);
    card.appendChild(btn);
  }
  if (subText) card.appendChild(el("p", "sub", subText));
  $feed.appendChild(card);
}

/* ================= Infinite scroll ================= */
const sentinelObserver = new IntersectionObserver((entries) => {
  if (entries.some((e) => e.isIntersecting)) loadMore(8);
}, { rootMargin: "250%" });

/* ================= New-kitties pill & lifecycle ================= */
const $pill = document.getElementById("new-pill");
$pill.addEventListener("click", async () => {
  $pill.classList.remove("show");
  const added = await prependFresh();
  if (added > 0) {
    announce("Fresh kitties at the top!");
  } else {
    // Nothing arrived (busy, offline, or no new kitties) — keep the
    // affordance so she can simply try again.
    $pill.classList.add("show");
  }
});

document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "hidden") {
    saveFeedNow();
  } else if (state.lastFetch && Date.now() - state.lastFetch > STALE_MS && state.items.size > 0) {
    $pill.classList.add("show");
  }
});
window.addEventListener("pagehide", saveFeedNow);

window.addEventListener("online", () => {
  removeStateCard();
  retryQueuedMedia();
  flushOutbox();
  loadMore(8);
});

/* ================= Icon generator (dev helper, ?makeicons) ================= */
async function makeIcons() {
  const symbol = document.getElementById("dodo-masthead");
  const svgStr = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">${symbol.innerHTML}</svg>`;
  const img = new Image();
  const lab = el("div", "iconlab");
  document.body.prepend(lab);
  await new Promise((resolve, reject) => {
    img.onload = resolve;
    img.onerror = reject;
    img.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svgStr);
  });
  const jobs = [
    { name: "icon-192.png", px: 192, pad: 0.08 },
    { name: "icon-512.png", px: 512, pad: 0.08 },
    { name: "icon-maskable-512.png", px: 512, pad: 0.2 },
    { name: "apple-touch-icon.png", px: 180, pad: 0.1 },
  ];
  for (const job of jobs) {
    const c = document.createElement("canvas");
    c.width = c.height = job.px;
    const cx = c.getContext("2d");
    cx.fillStyle = "#FBF1E0";
    cx.fillRect(0, 0, job.px, job.px);
    const inner = job.px * (1 - job.pad * 2);
    cx.drawImage(img, job.px * job.pad, job.px * job.pad, inner, inner);
    const dataUrl = c.toDataURL("image/png");
    const a = el("a", null, "⬇ " + job.name);
    a.href = dataUrl;
    a.download = job.name;
    lab.appendChild(a);
    if (location.hostname === "localhost" || location.hostname === "127.0.0.1") {
      try {
        await fetch("/dev/icon", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: job.name, dataUrl }),
        });
        a.textContent += " ✓ saved";
      } catch (e) { /* download links still work */ }
    }
  }
}

/* ================= Boot ================= */
sizeCanvas();
const hadHistory = restoreFeed();
if (!hadHistory) {
  loadMore(8);
} else if (Date.now() - state.lastFetch > STALE_MS) {
  $pill.classList.add("show");
}
sentinelObserver.observe($sentinel);
flushOutbox();
if (new URLSearchParams(location.search).has("makeicons")) makeIcons();
</script>
